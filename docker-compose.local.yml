services:
  db:
    image: postgres:16
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-saferide} -d $${POSTGRES_DB:-saferide}"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - saferide-postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "9001:9001"
    command: ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port \"$${API_PORT:-9001}\""]
    depends_on:
      db:
        condition: service_healthy

volumes:
  saferide-postgres-data:
